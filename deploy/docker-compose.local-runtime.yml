# =====================================================
# KleinAI · 本机全容器运行栈
#
# 目标：
#   - 业务服务全部容器启动：api / admin / openai / worker / user-web / admin-web
#   - 复用已有 1Panel MySQL/Redis 容器，不在本 compose 内创建数据库
#   - 保持当前对外访问端口：5173 / 5174 / 17180 / 17188 / 17200
#
# 使用：
#   cd /vol3/1000/workspace/gpt/gpt2api
#   docker compose -f deploy/docker-compose.local-runtime.yml up -d --build
# =====================================================

x-backend-base: &backend-base
  image: klein_ai/backend:local-runtime
  build:
    context: ../backend
    dockerfile: ../deploy/docker/backend-runtime.Dockerfile
  user: "0:0"
  env_file:
    - ./.env.local-runtime
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - klein-local-logs:/app/logs
    - ../backend/storage:/app/storage
  environment:
    TZ: Asia/Shanghai
  networks:
    - klein-local-runtime
  restart: unless-stopped

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: klein-flaresolverr-local
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: Asia/Shanghai
    networks:
      - klein-local-runtime

  api:
    <<: *backend-base
    container_name: klein-api-local
    entrypoint: ["/app/api"]
    environment:
      KLEIN_NODE_ID: "1"
    ports:
      - "17180:17180"

  admin:
    <<: *backend-base
    container_name: klein-admin-local
    entrypoint: ["/app/admin"]
    environment:
      KLEIN_NODE_ID: "2"
    ports:
      - "17188:17188"

  openai:
    <<: *backend-base
    container_name: klein-openai-local
    entrypoint: ["/app/openai"]
    environment:
      KLEIN_NODE_ID: "3"
    ports:
      - "17200:17200"

  worker:
    <<: *backend-base
    container_name: klein-worker-local
    entrypoint: ["/app/worker"]
    environment:
      KLEIN_NODE_ID: "4"

  user-web:
    image: klein_ai/user-web:local-runtime
    container_name: klein-user-web-local
    build:
      context: ../frontend
      dockerfile: ../deploy/docker/user-web-runtime.Dockerfile
    ports:
      - "5173:80"
    volumes:
      - ./nginx-dev/user-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - openai
    networks:
      - klein-local-runtime
    restart: unless-stopped

  admin-web:
    image: klein_ai/admin-web:local-runtime
    container_name: klein-admin-web-local
    build:
      context: ../frontend
      dockerfile: ../deploy/docker/admin-web-runtime.Dockerfile
    ports:
      - "5174:80"
    volumes:
      - ./nginx-dev/admin-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin
    networks:
      - klein-local-runtime
    restart: unless-stopped

volumes:
  klein-local-logs:

networks:
  klein-local-runtime:
    name: klein-local-runtime-net
